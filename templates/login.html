功能：用户登录表单
作者：大一学生助手

这个页面显示登录表单，用户输入用户名和密码登录。
-->

{% extends "base.html" %}

{% block title %}用户登录{% endblock %}

{% block content %}
<div class="card card-center">
    <h2 class="card-title">用户登录</h2>

    <!-- 错误提示 -->
    {% if error %}
    <div class="message message-error mb-20">
        {{ error }}
    </div>
    {% endif %}

    <!-- 登录表单 -->
    <form method="POST" action="{{ url_for('login') }}">
        <!-- 用户名输入框 -->
        <div class="form-group">
            <label class="form-label" for="username">用户名：</label>
            <input type="text" id="username" name="username" class="form-input"
                   placeholder="请输入用户名" required value="{{ username or '' }}">
        </div>

        <!-- 密码输入框 -->
        <div class="form-group">
            <label class="form-label" for="password">密码：</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="请输入密码" required>
        </div>

        <!-- 提交按钮 -->
        <div class="form-group">
            <button type="submit" class="form-btn" style="width: 100%;">登录</button>
        </div>

        <!-- 注册链接 -->
        <div class="form-group" style="text-align: center;">
            <p>还没有账号？ <a href="{{ url_for('register') }}">立即注册</a></p>
        </div>
    </form>

    <!-- 默认用户提示 -->
    <div class="mt-20 p-15 bg-gray" style="border-radius: 4px;">
        <h3>测试账号</h3>
        <p>用户名：admin</p>
        <p>密码：123456</p>
        <p><small>这是默认测试账号，实际使用请注册新账号。</small></p>
    </div>
</div>
{% endblock %}
